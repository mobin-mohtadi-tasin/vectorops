<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>VectorOps Workspace — Decentralized Cluster Intelligence</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>

<style>
  :root {
    --bg-page: #fafafa;
    --bg-sidebar: #f4f4f6;
    --bg-card: #ffffff;
    --border-card: #e4e4e7;

    --accent-emerald-bg: #ecfdf5;
    --accent-rose: #e11d48;
    --accent-rose-bg: #fff1f2;
    --accent-amber: #d97706;
    --accent-amber-bg: #fffbeb;
    --accent-blue: #2563eb;
    --accent-blue-bg: #eff6ff;

    --brand-emerald: #059669;
    --brand-emerald-bg: #ecfdf5;
    --brand-rose: #e11d48;
    --brand-rose-bg: #fff1f2;
    --brand-amber: #d97706;
    --brand-amber-bg: #fffbeb;
    --brand-blue: #2563eb;
    --brand-blue-bg: #eff6ff;
    --brand-dark: #0f172a;
    
    --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg-page);
    color: var(--text-body);
    font-family: var(--font-sans);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: var(--font-mono); }

  /* Top Sandbox Banner */
  .sandbox-bar {
    background: #fef9c3;
    border-bottom: 1px solid #fef08a;
    color: #854d0e;
    font-size: 11.5px;
    font-weight: 600;

  .sandbox-tag {

  /* Left Sidebar */

    bottom: 0;

  .sidebar-header {

    flex-direction: column;

    color: #ffffff;

    align-items: center;

    border: none;

    color: #71717a;
    padding: 6px;
    border-radius: 6px;

    justify-content: center;

  /* Main Content Area */

  .btn-soft:hover {
    background: #e4e4e7;

    color: #059669;
    border: 1px solid #a7f3d0;
    padding: 3px 8px;

  .badge-warning {
    background: #fffbeb;
    color: #d97706;

    font-weight: 600;

    height: 100%;

  .login-wrapper {

    display: flex;

    justify-content: center;

    width: 100%;
    max-width: 440px;

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

const API = window.location.protocol.startsWith("http") ? "" : "http://localhost:8000";

function useInterval(callback, delay) {
  const savedRef = useRef(callback);
  useEffect(() => { savedRef.current = callback; }, [callback]);
  useEffect(() => {
    if (delay === null) return;
    const id = setInterval(() => savedRef.current(), delay);
    return () => clearInterval(id);
  }, [delay]);
}

/* --- SVG Icons --- */
const Icons = {

/* --- LOGIN PAGE COMPONENT --- */

  const [email, setEmail] = useState("mobin@vectorops.ai");

  const presets = [

    { name: "Rinvi Zaman Riti", role: "Lead AI Researcher", email: "riti@vectorops.ai" },
    { name: "Tawhid Komol", role: "Senior Infrastructure Engineer", email: "komol@vectorops.ai" },

  const handleSelectPreset = (p) => {

  return (

            <div style={{ fontSize: 10, fontWeight: 700, color: "var(--text-muted)", letterSpacing: "0.18em" }}>WORKSPACE</div>
          </div>
          <div className="nvidia-badge">
            <svg width="30" height="24" viewBox="0 0 100 80" fill="#76b900">
              <path d="M 30,10 C 20,10 10,20 10,30 C 10,50 30,70 50,70 C 60,70 70,65 75,55 L 65,50 C 60,55 55,60 48,60 C 35,60 22,48 22,35 C 22,22 35,18 45,18 L 45,10 Z"/>

            <span className="mono" style={{ fontWeight: 800, fontSize: 13, color: "#000" }}>NVIDIA.</span>

/* --- TAB 1: HOME & DASHBOARD (GPU CLUSTERS FOCUS) --- */
const CLUSTER_META = {
  A: { name: "Lab Cluster", model: "NVIDIA GeForce RTX 4090", coresPerNode: 16384 },
  B: { name: "Faculty Cluster", model: "NVIDIA GeForce RTX 3080", coresPerNode: 8704 },
  C: { name: "Enterprise HPC", model: "NVIDIA A100-SXM4-80GB", coresPerNode: 6912 },
  D: { name: "Edge Inference", model: "NVIDIA L4 Tensor Core", coresPerNode: 7424 },
  E: { name: "Cloud Hyperscale", model: "NVIDIA H100 SXM5-80GB", coresPerNode: 16896 },
  F: { name: "Visual Workstation", model: "NVIDIA RTX 6000 Ada", coresPerNode: 18176 },
  G: { name: "Backup Compute", model: "NVIDIA Tesla T4", coresPerNode: 2560 }
};

function HomeTab({ nodes, decisions, cost, refresh }) {
  // Extract all cluster keys dynamically (A, B, C, D, E, F, G)
  const rawKeys = Array.from(new Set(nodes.map(n => n.cluster))).sort();
  const clusterKeys = rawKeys.length > 0 ? rawKeys : ["A", "B", "C", "D", "E", "F", "G"];

  // Global calculations across all clusters
  const totalCudaCores = nodes.reduce((acc, n) => {
    const meta = CLUSTER_META[n.cluster] || { coresPerNode: 8000 };
    return acc + meta.coresPerNode;
  }, 0);

  const totalVramGB = nodes.reduce((a, n) => a + n.vram_total_gb, 0);

  const triggerChaos = async (cluster) => {
    await fetch(`${API}/chaos`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ cluster, intensity: 1.0 })
    });
    refresh();
  };

  const scheduleDemoJob = async () => {
    const hottest = [...nodes].sort((a,b) => b.temp_c - a.temp_c)[0];
    if (!hottest) return;
    await fetch(`${API}/schedule`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ job_vram_gb: 6, current_node_id: hottest.node_id, job_id: `demo-job-${Date.now().toString().slice(-4)}` })
    });
    refresh();
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      {/* 4 Cluster Overview Stat Cards */}
      <div className="stats-grid">
        <div className="stat-card">
          <div className="stat-label">ONLINE GPU CLUSTERS</div>
          <div className="stat-value">{clusterKeys.length} Clusters ({nodes.length} Nodes)</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">TOTAL CUDA CORES</div>
          <div className="stat-value">{totalCudaCores > 0 ? totalCudaCores.toLocaleString() : "295,424"} Cores</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">COMBINED VRAM CAPACITY</div>
          <div className="stat-value">{totalVramGB > 0 ? totalVramGB.toFixed(1) : "1,128.0"} GB Total</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">ENERGY COST</div>
          <div className="stat-value">${cost ? cost.total_wasted_electricity_usd : "0.00"} / hr</div>
        </div>
      </div>

      {/* Dynamic 7 GPU Cluster Panels Grid */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(440px, 1fr))", gap: 20 }}>
        {clusterKeys.map(cKey => {
          const cNodes = nodes.filter(n => n.cluster === cKey);
          const meta = CLUSTER_META[cKey] || { name: `Cluster ${cKey}`, model: "NVIDIA GPU", coresPerNode: 8000 };
          const vramUsed = cNodes.reduce((a, n) => a + n.vram_used_gb, 0);
          const vramTotal = cNodes.reduce((a, n) => a + n.vram_total_gb, 0) || 1.0;
          const utilAvg = cNodes.length ? (cNodes.reduce((a, n) => a + n.gpu_core_util_pct, 0) / cNodes.length).toFixed(1) : "0.0";
          const clusterCores = (cNodes.length || 4) * meta.coresPerNode;
          
          let badgeClass = "badge-ready";
          let badgeText = "LIGHT TRAFFIC";
          if (utilAvg > 75) {
            badgeClass = "badge-danger";
            badgeText = "HIGH TRAFFIC";
          } else if (utilAvg > 45) {
            badgeClass = "badge-warning";
            badgeText = "MODERATE LOAD";
          }

          return (
            <div key={cKey} className="card" style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <h3 style={{ margin: 0, fontSize: 16.5, fontWeight: 700, color: "var(--text-heading)" }}>
                      Cluster {cKey} — {meta.name}
                    </h3>
                    <span className={badgeClass}>{badgeText}</span>
                  </div>
                  <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 2 }}>
                    {cNodes.length || 4}x {meta.model} Nodes
                  </div>
                </div>
                <button onClick={() => triggerChaos(cKey)} className="btn-soft" style={{ fontSize: 11.5 }}>
                  ⚡ Inject Chaos
                </button>
              </div>

              {/* Progress Bars Container */}
              <div style={{ display: "flex", flexDirection: "column", gap: 12, background: "#fafafa", padding: 14, borderRadius: 10, border: "1px solid var(--border-card)" }}>
                {/* VRAM Segment */}
                <div className="progress-segment">
                  <div className="progress-header">
                    <span style={{ color: "var(--text-muted)", fontWeight: 600 }}>VRAM Allocation</span>
                    <span className="mono" style={{ color: "#2563eb", fontWeight: 700 }}>
                      {vramUsed.toFixed(1)} / {vramTotal.toFixed(1)} GB ({Math.round((vramUsed / vramTotal) * 100)}%)
                    </span>
                  </div>
                  <div className="progress-bar-bg" style={{ height: 10, background: "#e2e8f0", borderRadius: 5, overflow: "hidden" }}>
                    <div className="progress-bar-fill" style={{ width: `${Math.max(4, Math.min(100, (vramUsed / vramTotal) * 100))}%`, height: "100%", background: "#2563eb", borderRadius: 5, transition: "width 0.6s ease" }} />
                  </div>
                </div>

                {/* GPU Core Load Segment */}
                <div className="progress-segment">
                  <div className="progress-header">
                    <span style={{ color: "var(--text-muted)", fontWeight: 600 }}>GPU Core Traffic Load</span>
                    <span className="mono" style={{ color: utilAvg > 75 ? "#e11d48" : utilAvg > 45 ? "#d97706" : "#059669", fontWeight: 700 }}>
                      {utilAvg}% Load
                    </span>
                  </div>
                  <div className="progress-bar-bg" style={{ height: 10, background: "#e2e8f0", borderRadius: 5, overflow: "hidden" }}>
                    <div className="progress-bar-fill" style={{ width: `${utilAvg}%`, height: "100%", background: utilAvg > 75 ? "#e11d48" : utilAvg > 45 ? "#d97706" : "#059669", borderRadius: 5, transition: "width 0.6s ease" }} />
                  </div>
                </div>

                {/* CUDA Cores Segment */}
                <div className="progress-segment">
                  <div className="progress-header">
                    <span style={{ color: "var(--text-muted)", fontWeight: 600 }}>CUDA Cores Active</span>
                    <span className="mono" style={{ color: "var(--text-heading)", fontWeight: 700 }}>
                      {clusterCores.toLocaleString()} / {clusterCores.toLocaleString()} Cores
                    </span>
                  </div>
                  <div className="progress-bar-bg" style={{ height: 10, background: "#e2e8f0", borderRadius: 5, overflow: "hidden" }}>
                    <div className="progress-bar-fill" style={{ width: "100%", height: "100%", background: "#09090b", borderRadius: 5 }} />
                  </div>
                </div>
              </div>

              {/* Nodes Breakdown Grid */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {cNodes.map(n => {
                  const vramPct = Math.round((n.vram_used_gb / n.vram_total_gb) * 100);
                  return (
                    <div key={n.node_id} style={{ background: "#ffffff", border: "1px solid var(--border-card)", borderRadius: 8, padding: 10, display: "flex", flexDirection: "column", gap: 6 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <span className="mono" style={{ fontWeight: 700, fontSize: 12 }}>{n.node_id}</span>
                        <span className={n.status === "unsafe" ? "badge-danger" : n.status === "warning" ? "badge-warning" : "badge-ready"}>{n.status.toUpperCase()}</span>
                      </div>
                      
                      {/* Node Mini VRAM Line Bar */}
                      <div>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10.5, color: "var(--text-muted)", marginBottom: 2 }} className="mono">
                          <span>VRAM Allocation</span>
                          <span style={{ color: "#2563eb", fontWeight: 700 }}>{n.vram_used_gb}/{n.vram_total_gb} GB</span>
                        </div>
                        <div style={{ height: 6, background: "#f4f4f5", borderRadius: 3, overflow: "hidden" }}>
                          <div style={{ width: `${Math.max(4, vramPct)}%`, height: "100%", background: "#2563eb", borderRadius: 3 }} />
                        </div>
                      </div>

                      <div style={{ fontSize: 10.5, color: "var(--text-muted)" }} className="mono">Util: {n.gpu_core_util_pct}% · {n.temp_c}°C</div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* Split Bottom Cards */}
      <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr", gap: 20 }}>
        {/* Scheduler Decision Log */}
        <div className="card">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: "var(--text-heading)" }}>Scheduler Decision Log</h3>
            <button onClick={scheduleDemoJob} className="btn-black" style={{ padding: "6px 12px", fontSize: 11.5 }}>+ Schedule Demo Job</button>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, maxHeight: 220, overflowY: "auto" }}>
            {decisions.length === 0 && <div style={{ fontSize: 12, color: "var(--text-muted)" }}>No scheduling events logged.</div>}
            {[...decisions].reverse().map((d, i) => (
              <div key={i} style={{ background: "#fafafa", border: "1px solid var(--border-card)", borderRadius: 8, padding: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontWeight: 700 }}>
                  <span>{d.job_id}</span>
                  <span className="mono" style={{ fontSize: 10, color: d.migrated ? "var(--accent-rose)" : "var(--accent-emerald)" }}>

                <div style={{ fontSize: 11.5, color: "var(--text-muted)", marginTop: 4, lineHeight: 1.4 }}>{d.reason}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Cost & Energy Optimizer */}
        <div className="card">
          <h3 style={{ margin: "0 0 14px 0", fontSize: 15, fontWeight: 700, color: "var(--text-heading)" }}>Cost & Energy Optimizer</h3>
          {cost && (
            <div>
              <div style={{ display: "flex", gap: 20, marginBottom: 12 }}>
                <div>
                  <div className="mono" style={{ fontSize: 24, fontWeight: 700, color: "var(--brand-amber)" }}>
                    {cost.idle_node_count}/{cost.total_nodes}
                  </div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", textTransform: "uppercase", fontWeight: 600 }}>Idle GPUs</div>
                </div>
                <div>
                  <div className="mono" style={{ fontSize: 24, fontWeight: 700, color: "var(--brand-rose)" }}>
                    ${cost.total_cloud_opportunity_cost_usd}/hr
                  </div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", textTransform: "uppercase", fontWeight: 600 }}>Cloud Equiv. Wasted</div>
                </div>
              </div>
              <div style={{ fontSize: 12.5, color: "var(--text-muted)", lineHeight: 1.5, background: "#fafafa", padding: 12, borderRadius: 8, border: "1px solid var(--border-card)" }}>
                {cost.headline}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* --- TAB 2: WORK (WORK & PROCESS QUEUE) --- */
function WorkTab({ currentUser }) {
  const [jobs, setJobs] = useState([]);
  const [name, setName] = useState("");
  const [vram, setVram] = useState(8);
  const [priority, setPriority] = useState("Medium");
  const [user, setUser] = useState(currentUser ? currentUser.name : "Wasif Abdullah Musa");

  useEffect(() => {
    if (currentUser) setUser(currentUser.name);
  }, [currentUser]);

  const fetchJobs = useCallback(async () => {
    try {
      const res = await fetch(`${API}/queue`);
      setJobs(await res.json());
    } catch(e){}
  }, []);

  useEffect(() => { fetchJobs(); }, [fetchJobs]);

  const submitJob = async (e) => {
    e.preventDefault();
    if (!name) return;
    await fetch(`${API}/queue/submit`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, vram_gb: parseFloat(vram), priority, user })
    });
    setName("");
    fetchJobs();
  };

  const cancelJob = async (id) => {
    await fetch(`${API}/queue/cancel/${id}`, { method: "POST" });
    fetchJobs();
  };

  const deleteJob = async (id) => {
    await fetch(`${API}/queue/${id}`, { method: "DELETE" });
    fetchJobs();
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 2.5fr", gap: 20 }}>
        <div className="card">
          <h3 style={{ margin: "0 0 14px 0", fontSize: 15, fontWeight: 700 }}>Submit Workload</h3>
          <form onSubmit={submitJob} style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div>
              <label style={{ fontSize: 11.5, fontWeight: 600, color: "var(--text-muted)", display: "block", marginBottom: 4 }}>TASK NAME</label>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. resnet50-train" style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border-card)", fontSize: 13 }} required />
            </div>
            <div>
              <label style={{ fontSize: 11.5, fontWeight: 600, color: "var(--text-muted)", display: "block", marginBottom: 4 }}>VRAM REQUIRED (GB)</label>
              <input type="number" value={vram} onChange={e=>setVram(e.target.value)} min="1" max="48" style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border-card)", fontSize: 13 }} required />
            </div>
            <div>
              <label style={{ fontSize: 11.5, fontWeight: 600, color: "var(--text-muted)", display: "block", marginBottom: 4 }}>SUBMITTING USER</label>
              <input value={user} onChange={e=>setUser(e.target.value)} style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border-card)", fontSize: 13 }} required />
            </div>
            <div>
              <label style={{ fontSize: 11.5, fontWeight: 600, color: "var(--text-muted)", display: "block", marginBottom: 4 }}>PRIORITY</label>
              <select value={priority} onChange={e=>setPriority(e.target.value)} style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border-card)", fontSize: 13 }}>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
              </select>
            </div>
            <button type="submit" className="btn-black" style={{ marginTop: 6 }}>+ Queue Workload</button>
          </form>
        </div>

        <div className="card">
          <h3 style={{ margin: "0 0 14px 0", fontSize: 15, fontWeight: 700 }}>Active Process Queue</h3>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", textAlign: "left", fontSize: 13 }}>
              <thead>
                <tr style={{ borderBottom: "1px solid var(--border-card)", color: "var(--text-muted)" }}>
                  <th style={{ padding: "8px 10px" }}>JOB ID</th>
                  <th style={{ padding: "8px 10px" }}>NAME</th>
                  <th style={{ padding: "8px 10px" }}>USER</th>
                  <th style={{ padding: "8px 10px" }}>VRAM</th>
                  <th style={{ padding: "8px 10px" }}>PRIORITY</th>
                  <th style={{ padding: "8px 10px" }}>STATUS</th>
                  <th style={{ padding: "8px 10px" }}>ACTIONS</th>
                </tr>
              </thead>
              <tbody>
                {jobs.map(j => (
                  <tr key={j.job_id} style={{ borderBottom: "1px solid #f4f4f5" }}>
                    <td className="mono" style={{ padding: "10px", fontWeight: 700 }}>{j.job_id}</td>
                    <td style={{ padding: "10px", fontWeight: 600 }}>{j.name}</td>
                    <td style={{ padding: "10px", color: "var(--text-muted)" }}>{j.user}</td>
                    <td className="mono" style={{ padding: "10px" }}>{j.vram_gb} GB</td>
                    <td style={{ padding: "10px" }}>{j.priority}</td>
                    <td style={{ padding: "10px" }}>
                      <span className={j.status === "Running" ? "badge-ready" : j.status === "Queued" ? "badge-warning" : "badge-danger"}>
                        {j.status.toUpperCase()}
                      </span>
                    </td>
                    <td style={{ padding: "10px", display: "flex", gap: 6 }}>
                      {j.status === "Queued" && (
                        <button onClick={()=>cancelJob(j.job_id)} className="btn-soft" style={{ padding: "4px 8px", fontSize: 11 }}>Cancel</button>
                      )}
                      <button onClick={()=>deleteJob(j.job_id)} className="btn-soft" style={{ padding: "4px 8px", fontSize: 11 }}>Delete</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

/* --- TAB 4: SUPPORT (CHAT) --- */
function SupportTab() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");

  const fetchMessages = useCallback(async () => {
    try {
      const res = await fetch(`${API}/support/messages`);
      setMessages(await res.json());
    } catch(e){}
  }, []);

  useEffect(() => { fetchMessages(); }, [fetchMessages]);

  const sendSupport = async () => {
    if (!input.trim()) return;
    const txt = input.trim();
    setInput("");
    await fetch(`${API}/support/chat`, {

      body: JSON.stringify({ message: txt })

    fetchMessages();
  };

  return (
    <div className="card" style={{ display: "flex", flexDirection: "column", height: 500, maxWidth: 840 }}>

          <div key={m.id} style={{

        ))}
      </div>
      <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendSupport()} placeholder="Type message to IT Support..." style={{ flex: 1, padding: "10px 12px", borderRadius: 8, border: "1px solid var(--border-card)", fontSize: 13 }} />

  );
}

        <div className="stat-card">
          <div className="stat-label">TOTAL SYSTEM RAM</div>
          <div className="stat-value">512.0 GB</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">CPU THREADS</div>
          <div className="stat-value">192 threads</div>
        </div>
      </div>

      {/* Split Bottom Cards */}
      <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr", gap: 20 }}>
        <div className="card">
          <h3 style={{ margin: "0 0 16px 0", fontSize: 15, fontWeight: 700 }}>Available Training Nodes</h3>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, maxHeight: 300, overflowY: "auto" }}>
            {nodes.map(n => (
              <div key={n.node_id} style={{ background: "#fafafa", border: "1px solid var(--border-card)", borderRadius: 10, padding: "12px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 13 }}>Node {n.node_id} (Cluster {n.cluster})</div>
                  <div style={{ fontSize: 11.5, color: "var(--text-muted)" }}>{n.gpu_model} - {n.vram_total_gb} GB VRAM</div>

            ))}
          </div>
        </div>

        <div className="card">
          <h3 style={{ margin: "0 0 16px 0", fontSize: 15, fontWeight: 700 }}>Training Event Log</h3>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, maxHeight: 300, overflowY: "auto" }}>
            <div style={{ background: "#fafafa", border: "1px solid var(--border-card)", borderRadius: 8, padding: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontWeight: 700 }}>
                <span>Running on Node A-01</span>
                <span style={{ fontSize: 10, color: "var(--text-muted)" }}>6/23/2026</span>
              </div>
              <div className="mono" style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 4 }}>
                [vectorops-rf] checkpoint saved epoch=450 loss=0.042
              </div>
            </div>
            <div style={{ background: "#fafafa", border: "1px solid var(--border-card)", borderRadius: 8, padding: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontWeight: 700 }}>
                <span>Running on Node E-02</span>
                <span style={{ fontSize: 10, color: "var(--text-muted)" }}>6/23/2026</span>
              </div>
              <div className="mono" style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 4 }}>
                [llama3-lora] phase=gradient_accumulation step=8400 eval_loss=0.812
              </div>
            </div>
            <div style={{ background: "#fafafa", border: "1px solid var(--border-card)", borderRadius: 8, padding: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontWeight: 700 }}>
                <span>Running on Node C-04</span>
                <span style={{ fontSize: 10, color: "var(--text-muted)" }}>6/23/2026</span>
              </div>
              <div className="mono" style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 4 }}>
                [craftly-worker] phase=lineage_cache_lock_wait lock_age_seconds=264.1
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* --- TAB 6: AGENT (OPENROUTER AI) --- */
function AgentTab() {
  const [messages, setMessages] = useState([
    { role: "assistant", text: "Hello! I am your domain-guarded VectorOps Cluster Agent. Ask me anything regarding GPU telemetry, scheduler scoring, or VRAM optimization." }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);

  const sendPrompt = async () => {
    if (!input.trim()) return;
    const prompt = input.trim();
    setInput("");
    setMessages(m => [...m, { role: "user", text: prompt }]);
    setLoading(true);

    try {
      const res = await fetch(`${API}/agent/chat`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      });
      const data = await res.json();
      setMessages(m => [...m, { role: "assistant", text: data.answer, source: data.source }]);
    } catch(e) {
      setMessages(m => [...m, { role: "assistant", text: "Error connecting to Agent." }]);
    }
    setLoading(false);
  };

  return (
    <div className="card" style={{ display: "flex", flexDirection: "column", height: 500, maxWidth: 840 }}>
      <h3 style={{ margin: "0 0 14px 0", fontSize: 15, fontWeight: 700 }}>OpenRouter Domain-Gated Agent</h3>
      <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 10 }}>
        {messages.map((m, i) => (
          <div key={i} style={{
            alignSelf: m.role === "user" ? "flex-end" : "flex-start",
            maxWidth: "85%", background: m.role === "user" ? "var(--pill-black)" : "#f4f4f5",
            color: m.role === "user" ? "#ffffff" : "var(--text-heading)",
            borderRadius: 10, padding: "10px 14px", fontSize: 13
          }}>
            <div>{m.text}</div>
          </div>
        ))}
        {loading && <div style={{ fontSize: 12, color: "var(--text-muted)" }}>Agent thinking...</div>}
      </div>
      <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendPrompt()} placeholder="Ask Agent regarding GPU cluster tasks..." style={{ flex: 1, padding: "10px 12px", borderRadius: 8, border: "1px solid var(--border-card)", fontSize: 13 }} />
        <button onClick={sendPrompt} className="btn-black">Ask Agent</button>
      </div>
    </div>
  );
}

/* --- TAB 7: FEEDBACK --- */
function FeedbackTab({ currentUser }) {
  const [name, setName] = useState(currentUser ? currentUser.name : "");
  const [comments, setComments] = useState("");
  const [feedbackList, setFeedbackList] = useState([]);

  useEffect(() => {
    if (currentUser) setName(currentUser.name);
  }, [currentUser]);

  const fetchFeedback = useCallback(async () => {
    try {
      const res = await fetch(`${API}/feedback`);
      setFeedbackList(await res.json());
    } catch(e){}
  }, []);

  useEffect(() => { fetchFeedback(); }, [fetchFeedback]);

  const submitForm = async (e) => {
    e.preventDefault();
    if (!name || !comments) return;
    await fetch(`${API}/feedback`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_name: name, category: "general", rating: 5, comments })
    });
    setComments("");
    fetchFeedback();
  };

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr", gap: 20, maxWidth: 900 }}>
      <div className="card">
        <h3 style={{ margin: "0 0 14px 0", fontSize: 15, fontWeight: 700 }}>Submit Feedback</h3>
        <form onSubmit={submitForm} style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your Name" style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border-card)", fontSize: 13 }} required />
          <textarea value={comments} onChange={e=>setComments(e.target.value)} rows="4" placeholder="Feedback or issue details..." style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border-card)", fontSize: 13 }} required />
          <button type="submit" className="btn-black">Submit</button>
        </form>
      </div>

      <div className="card">
        <h3 style={{ margin: "0 0 14px 0", fontSize: 15, fontWeight: 700 }}>Recent Submissions</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {feedbackList.map(f => (
            <div key={f.id} style={{ background: "#fafafa", padding: 10, borderRadius: 8, border: "1px solid var(--border-card)" }}>
              <div style={{ fontWeight: 700, fontSize: 12 }}>{f.user_name}</div>
              <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 2 }}>"{f.comments}"</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* --- MAIN CONTAINER APP --- */
function App() {
  const [currentUser, setCurrentUser] = useState(() => {
    const saved = localStorage.getItem("vectorops_user");
    if (saved) {
      try { return JSON.parse(saved); } catch(e){}
    }
    return null; // Show Login Page first!
  });

  const [tab, setTab] = useState("home");
  const [nodes, setNodes] = useState([]);
  const [decisions, setDecisions] = useState([]);
  const [cost, setCost] = useState(null);

  const handleLogin = (userData) => {
    setCurrentUser(userData);
    localStorage.setItem("vectorops_user", JSON.stringify(userData));
  };

  const handleLogout = () => {
    setCurrentUser(null);
    localStorage.removeItem("vectorops_user");
  };

  const refresh = useCallback(async () => {
    try {
      const [nRes, dRes, cRes] = await Promise.all([
        fetch(`${API}/nodes`), fetch(`${API}/decisions`), fetch(`${API}/cost`)
      ]);
      setNodes(await nRes.json());
      setDecisions(await dRes.json());
      setCost(await cRes.json());
    } catch (e) {}
  }, []);

  useEffect(() => {
    if (currentUser) refresh();
  }, [currentUser, refresh]);
  
  useInterval(() => {
    if (currentUser) refresh();
  }, 2000);

  if (!currentUser) {
    return <LoginPage onLogin={handleLogin} />;
  }

  const titles = {
    home: { title: "VectorOps Cluster Intelligence", sub: "Live GPU clusters monitoring, traffic load, VRAM allocation, and CUDA cores" },
    work: { title: "Work & Process Queue", sub: "Manage pending workloads and active GPU job allocations" },
    notification: { title: "System Notifications", sub: "Real-time alerts for GPU utilization, thermal spikes, and task events" },
    support: { title: "IT Support Helpdesk", sub: "Direct chat communication channel with cluster administrators" },
    training: { title: "Training Progress", sub: "Contribute hardware acceleration to train Craftly Machine Learning Models" },
    agent: { title: "OpenRouter Domain-Gated Agent", sub: "Specialized AI assistant restricted strictly to VectorOps cluster tasks" },
    feedback: { title: "User Feedback & Issues", sub: "Help us improve VectorOps cluster intelligence platform" },
  };

  return (
    <div className="app-container">
      {/* Left Sidebar */}
      <aside className="sidebar">
        <div className="sidebar-header">
          <div className="sidebar-title">VectorOps</div>
          <div className="sidebar-subtitle">WORKSPACE</div>
        </div>

        <nav className="nav-list">
          <button onClick={()=>setTab("home")} className={`nav-btn ${tab==="home"?"active":""}`}>
            <Icons.Home /> <span>Home</span>
          </button>
          <button onClick={()=>setTab("work")} className={`nav-btn ${tab==="work"?"active":""}`}>
            <Icons.Work /> <span>Work & Process Queue</span>
          </button>
          <button onClick={()=>setTab("notification")} className={`nav-btn ${tab==="notification"?"active":""}`}>
            <Icons.Notifications /> <span>Notifications</span>
          </button>
          <button onClick={()=>setTab("support")} className={`nav-btn ${tab==="support"?"active":""}`}>
            <Icons.Support /> <span>Support</span>
          </button>

          <button onClick={()=>setTab("training")} className={`nav-btn ${tab==="training"?"active":""}`}>
            <Icons.Training /> <span>Training Progress</span>
          </button>
          <button onClick={()=>setTab("agent")} className={`nav-btn ${tab==="agent"?"active":""}`}>
            <Icons.Agent /> <span>Agent</span>
          </button>
          <button onClick={()=>setTab("feedback")} className={`nav-btn ${tab==="feedback"?"active":""}`}>
            <Icons.Feedback /> <span>Feedback</span>
          </button>
        </nav>

        {/* Dynamic User Profile Footer */}
        <div className="user-footer">
          <div className="user-profile-meta">
            <div className="user-avatar">{currentUser.avatar}</div>
            <div className="user-info">
              <div className="user-name" title={currentUser.name}>{currentUser.name}</div>
              <div className="user-role" title={currentUser.role}>{currentUser.role}</div>
            </div>
          </div>
          <button onClick={handleLogout} className="btn-logout-icon" title="Sign Out of VectorOps Workspace">
            <Icons.LogOut />
          </button>
        </div>
      </aside>

      {/* Main Wrapper */}
      <div className="main-wrapper">
        <div className="sandbox-bar">
          <span className="sandbox-tag">SANDBOX</span> This workspace is separate from production data.
        </div>

        <header className="content-header">
          <div>
            <h1 className="page-title">{titles[tab].title}</h1>
            <div className="page-subtitle">{titles[tab].sub}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <button onClick={handleLogout} className="btn-soft" style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }} title="Sign Out">
              <Icons.LogOut /> <span>Sign Out</span>
            </button>
            <div className="nvidia-badge">
              <svg width="36" height="28" viewBox="0 0 100 80" fill="#76b900">
                <path d="M 30,10 C 20,10 10,20 10,30 C 10,50 30,70 50,70 C 60,70 70,65 75,55 L 65,50 C 60,55 55,60 48,60 C 35,60 22,48 22,35 C 22,22 35,18 45,18 L 45,10 Z"/>
              </svg>
              <span className="mono" style={{ fontWeight: 800, fontSize: 16, letterSpacing: "-0.04em", color: "#000" }}>NVIDIA.</span>
            </div>
          </div>
        </header>

        <main className="main-body">
          {tab === "home" && <HomeTab nodes={nodes} decisions={decisions} cost={cost} refresh={refresh} />}
          {tab === "work" && <WorkTab currentUser={currentUser} />}
          {tab === "notification" && <NotificationTab />}
          {tab === "support" && <SupportTab />}
          {tab === "training" && <TrainingTab nodes={nodes} />}
          {tab === "agent" && <AgentTab />}
          {tab === "feedback" && <FeedbackTab currentUser={currentUser} />}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
