<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>VectorOps Workspace — Decentralized Cluster Intelligence</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
<style>
  :root {
    --bg-page: #fafafa;
    --bg-sidebar: #f4f4f6;
    --bg-card: #ffffff;
    --border-card: #e4e4e7;
    --border-subtle: #f4f4f5;
    
    --text-heading: #09090b;
    --text-body: #27272a;
    --text-muted: #71717a;
    --text-dim: #a1a1aa;
    
    --pill-black: #09090b;
    --pill-black-hover: #27272a;
    --pill-white: #ffffff;
    
    --accent-emerald: #059669;
    --accent-emerald-bg: #ecfdf5;
    --accent-rose: #e11d48;
    --accent-rose-bg: #fff1f2;
    --accent-amber: #d97706;
    --accent-amber-bg: #fffbeb;
    --accent-blue: #2563eb;
    --accent-blue-bg: #eff6ff;
    
    --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg-page);
    color: var(--text-body);
    font-family: var(--font-sans);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: var(--font-mono); }

  /* Top Sandbox Banner */
  .sandbox-bar {
    background: #fef9c3;
    border-bottom: 1px solid #fef08a;
    color: #854d0e;
    font-size: 11.5px;
    font-weight: 600;
    padding: 7px 24px;
    text-align: center;
    letter-spacing: 0.02em;
  }
  .sandbox-tag {
    background: #fde047;
    color: #713f12;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 10px;
    margin-right: 6px;
    letter-spacing: 0.05em;
  }

  /* App Layout */
  .app-container {
    display: flex;
    min-height: 100vh;
  }

  /* Left Sidebar */
  .sidebar {
    width: 250px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border-card);
    position: fixed;
    top: 0;
    bottom: 0;
    left: 0;
    display: flex;
    flex-direction: column;
    padding: 24px 16px;
    z-index: 100;
  }

  .sidebar-header {
    display: flex;
    flex-direction: column;
    padding: 0 8px 20px 8px;
    border-bottom: 1px solid #e4e4e7;
    margin-bottom: 20px;
  }
  .sidebar-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--text-heading);
    letter-spacing: -0.03em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sidebar-subtitle {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .nav-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 500;
    color: #3f3f46;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    width: 100%;
  }

  .nav-btn:hover {
    background: #e4e4e7;
    color: var(--text-heading);
  }

  .nav-btn.active {
    background: var(--pill-black);
    color: var(--pill-white);
    font-weight: 600;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  }

  .nav-btn svg {
    width: 18px;
    height: 18px;
    stroke-width: 2;
    flex-shrink: 0;
  }

  /* User Profile Footer */
  .user-footer {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 10px 0 10px;
    border-top: 1px solid #e4e4e7;
    margin-top: auto;
  }
  .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--pill-black);
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }
  .user-info {
    display: flex;
    flex-direction: column;
  }
  .user-name {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--text-heading);
    line-height: 1.2;
  }
  .user-role {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Main Content Area */
  .main-wrapper {
    margin-left: 250px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .content-header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border-card);
    padding: 24px 36px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .page-title {
    font-size: 24px;
    font-weight: 800;
    color: var(--text-heading);
    margin: 0;
    letter-spacing: -0.02em;
  }
  .page-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .nvidia-badge {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .main-body {
    padding: 28px 36px 60px 36px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 1400px;
  }

  /* White Card Component */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: 14px;
    padding: 20px 24px;
    box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.02);
  }

  /* Buttons */
  .btn-black {
    background: var(--pill-black);
    color: #ffffff;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn-black:hover {
    background: var(--pill-black-hover);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  }

  .btn-soft {
    background: #f4f4f5;
    color: #27272a;
    border: 1px solid #e4e4e7;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn-soft:hover {
    background: #e4e4e7;
  }

  .badge-ready {
    background: #ecfdf5;
    color: #059669;
    border: 1px solid #a7f3d0;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .badge-warning {
    background: #fffbeb;
    color: #d97706;
    border: 1px solid #fde68a;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
  }
  .badge-danger {
    background: #fff1f2;
    color: #e11d48;
    border: 1px solid #fecdd3;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
  }

  /* Grid Layouts */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    border-radius: 12px;
    padding: 16px 20px;
  }
  .stat-label {
    font-size: 10.5px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 800;
    color: var(--text-heading);
    margin-top: 4px;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

const API = window.location.protocol.startsWith("http") ? "" : "http://localhost:8000";

function useInterval(callback, delay) {
  const savedRef = useRef(callback);
  useEffect(() => { savedRef.current = callback; }, [callback]);
  useEffect(() => {
    if (delay === null) return;
    const id = setInterval(() => savedRef.current(), delay);
    return () => clearInterval(id);
  }, [delay]);
}

/* --- SVG Icons --- */
const Icons = {
  Home: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  Work: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect width="20" height="14" x="2" y="7" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
  Notifications: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>,
  Support: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  Training: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 7h10v10H7z"/><path d="M10 10h4v4h-4z"/></svg>,
  Agent: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2 2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/><rect width="18" height="12" x="3" y="8" rx="2"/><path d="M7 14h.01M17 14h.01"/></svg>,
  Feedback: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
};

/* --- TAB 1: HOME & DASHBOARD --- */
function HomeTab({ nodes, decisions, cost, refresh }) {
  const clusterA = nodes.filter(n => n.cluster === "A");
  const clusterB = nodes.filter(n => n.cluster === "B");
  const onlineCount = nodes.length || 12;
  const totalVram = nodes.reduce((a, n) => a + n.vram_total_gb, 0) || 204.0;
  const usedVram = nodes.reduce((a, n) => a + n.vram_used_gb, 0);
  const avgUtil = nodes.length ? (nodes.reduce((a, n) => a + n.gpu_core_util_pct, 0) / nodes.length).toFixed(1) : "74.5";

  const triggerChaos = async (cluster) => {
    await fetch(`${API}/chaos`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ cluster, intensity: 1.0 })
    });
    refresh();
  };

  const scheduleDemoJob = async () => {
    const hottest = [...nodes].sort((a,b) => b.temp_c - a.temp_c)[0];
    if (!hottest) return;
    await fetch(`${API}/schedule`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ job_vram_gb: 6, current_node_id: hottest.node_id, job_id: `demo-job-${Date.now().toString().slice(-4)}` })
    });
    refresh();
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      {/* CTA Card */}
      <div className="card" style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700, color: "var(--text-heading)" }}>Contribute this desktop to model training</h3>
          <div style={{ fontSize: 12.5, color: "var(--text-muted)", marginTop: 2 }}>When you opt-in, your hardware powers up VectorOps Machine Learning Model training process. You can opt out anytime.</div>
        </div>
        <button onClick={scheduleDemoJob} className="btn-black">Opt In / Run Job</button>
      </div>

      {/* Training Progress Card */}
      <div className="card">
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 11, fontWeight: 700, color: "var(--text-muted)", letterSpacing: "0.08em" }}>MODEL TRAINING PROGRESS</span>
          <span className="mono" style={{ fontSize: 11, color: "var(--text-muted)", fontWeight: 600 }}>8H 8M REMAINING</span>
        </div>
        <div className="mono" style={{ fontSize: 32, fontWeight: 800, color: "var(--text-heading)", margin: "8px 0" }}>
          {avgUtil}%
        </div>
        <div style={{ height: 8, background: "#f4f4f5", borderRadius: 4, overflow: "hidden" }}>
          <div style={{ width: `${avgUtil}%`, height: "100%", background: "var(--pill-black)", transition: "width 0.8s ease" }} />
        </div>
        <div className="mono" style={{ fontSize: 11, color: "var(--text-dim)", marginTop: 8 }}>
          vectorops_robot_pretrain_1m_foundation_20260622_v9_adamw_signed_env.train
        </div>
      </div>

      {/* 4 Summary Stats */}
      <div className="stats-grid">
        <div className="stat-card">
          <div className="stat-label">ONLINE NODES</div>
          <div className="stat-value">{onlineCount} online</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">COMBINED GPU RAM</div>
          <div className="stat-value">{totalVram.toFixed(1)} GB</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">ACTIVE VRAM USAGE</div>
          <div className="stat-value">{usedVram.toFixed(1)} GB</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">CPU THREADS</div>
          <div className="stat-value">192 threads</div>
        </div>
      </div>

      {/* Split Bottom Cards */}
      <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr", gap: 20 }}>
        {/* Left: Available Training Nodes */}
        <div className="card">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: "var(--text-heading)" }}>Available Training Nodes</h3>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => triggerChaos("A")} className="btn-soft">Chaos A</button>
              <button onClick={() => triggerChaos("B")} className="btn-soft">Chaos B</button>
            </div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, maxHeight: 360, overflowY: "auto" }}>
            {nodes.map(n => (
              <div key={n.node_id} style={{ background: "#fafafa", border: "1px solid var(--border-card)", borderRadius: 10, padding: "12px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 13, color: "var(--text-heading)" }}>Node {n.node_id} (Cluster {n.cluster})</div>
                  <div style={{ fontSize: 11.5, color: "var(--text-muted)", marginTop: 2 }}>{n.gpu_model} · {n.vram_used_gb}/{n.vram_total_gb} GB VRAM · {n.temp_c}°C</div>
                </div>
                <span className={n.status === "unsafe" ? "badge-danger" : n.status === "warning" ? "badge-warning" : "badge-ready"}>
                  {n.status.toUpperCase()}
                </span>
              </div>
            ))}
          </div>
        </div>

        {/* Right: Event Log */}
        <div className="card">
          <h3 style={{ margin: "0 0 16px 0", fontSize: 15, fontWeight: 700, color: "var(--text-heading)" }}>Training Event Log</h3>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, maxHeight: 360, overflowY: "auto" }}>
            {decisions.length === 0 && <div style={{ fontSize: 12, color: "var(--text-muted)" }}>No scheduling events logged.</div>}
            {[...decisions].reverse().map((d, i) => (
              <div key={i} style={{ background: "#fafafa", border: "1px solid var(--border-card)", borderRadius: 8, padding: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontWeight: 700 }}>
                  <span>{d.job_id}</span>
                  <span className="mono" style={{ fontSize: 10, color: "var(--text-muted)" }}>{d.migrated ? "MIGRATED" : "PLACED"}</span>
                </div>
                <div style={{ fontSize: 11.5, color: "var(--text-muted)", marginTop: 4, lineHeight: 1.4 }}>{d.reason}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* --- TAB 2: WORK (JOB QUEUE) --- */
function WorkTab() {
  const [jobs, setJobs] = useState([]);
  const [name, setName] = useState("");
  const [vram, setVram] = useState(8);
  const [priority, setPriority] = useState("Medium");
  const [user, setUser] = useState("Wasif Abdullah Musa");

  const fetchJobs = useCallback(async () => {
    try {
      const res = await fetch(`${API}/queue`);
      setJobs(await res.json());
    } catch(e){}
  }, []);

  useEffect(() => { fetchJobs(); }, [fetchJobs]);

  const submitJob = async (e) => {
    e.preventDefault();
    if (!name) return;
    await fetch(`${API}/queue/submit`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, vram_gb: parseFloat(vram), priority, user })
    });
    setName("");
    fetchJobs();
  };

  const cancelJob = async (id) => {
    await fetch(`${API}/queue/cancel/${id}`, { method: "POST" });
    fetchJobs();
  };

  const deleteJob = async (id) => {
    await fetch(`${API}/queue/${id}`, { method: "DELETE" });
    fetchJobs();
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 2.5fr", gap: 20 }}>
        <div className="card">
          <h3 style={{ margin: "0 0 14px 0", fontSize: 15, fontWeight: 700 }}>Submit Workload</h3>
          <form onSubmit={submitJob} style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div>
              <label style={{ fontSize: 11.5, fontWeight: 600, color: "var(--text-muted)", display: "block", marginBottom: 4 }}>TASK NAME</label>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. resnet50-train" style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border-card)", fontSize: 13 }} required />
            </div>
            <div>
              <label style={{ fontSize: 11.5, fontWeight: 600, color: "var(--text-muted)", display: "block", marginBottom: 4 }}>VRAM REQUIRED (GB)</label>
              <input type="number" value={vram} onChange={e=>setVram(e.target.value)} min="1" max="48" style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border-card)", fontSize: 13 }} required />
            </div>
            <div>
              <label style={{ fontSize: 11.5, fontWeight: 600, color: "var(--text-muted)", display: "block", marginBottom: 4 }}>PRIORITY</label>
              <select value={priority} onChange={e=>setPriority(e.target.value)} style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border-card)", fontSize: 13 }}>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
              </select>
            </div>
            <button type="submit" className="btn-black" style={{ marginTop: 6 }}>+ Queue Workload</button>
          </form>
        </div>

        <div className="card">
          <h3 style={{ margin: "0 0 14px 0", fontSize: 15, fontWeight: 700 }}>Active Process Queue</h3>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", textAlign: "left", fontSize: 13 }}>
              <thead>
                <tr style={{ borderBottom: "1px solid var(--border-card)", color: "var(--text-muted)" }}>
                  <th style={{ padding: "8px 10px" }}>JOB ID</th>
                  <th style={{ padding: "8px 10px" }}>NAME</th>
                  <th style={{ padding: "8px 10px" }}>USER</th>
                  <th style={{ padding: "8px 10px" }}>VRAM</th>
                  <th style={{ padding: "8px 10px" }}>PRIORITY</th>
                  <th style={{ padding: "8px 10px" }}>STATUS</th>
                  <th style={{ padding: "8px 10px" }}>ACTIONS</th>
                </tr>
              </thead>
              <tbody>
                {jobs.map(j => (
                  <tr key={j.job_id} style={{ borderBottom: "1px solid #f4f4f5" }}>
                    <td className="mono" style={{ padding: "10px", fontWeight: 700 }}>{j.job_id}</td>
                    <td style={{ padding: "10px", fontWeight: 600 }}>{j.name}</td>
                    <td style={{ padding: "10px", color: "var(--text-muted)" }}>{j.user}</td>
                    <td className="mono" style={{ padding: "10px" }}>{j.vram_gb} GB</td>
                    <td style={{ padding: "10px" }}>{j.priority}</td>
                    <td style={{ padding: "10px" }}>
                      <span className={j.status === "Running" ? "badge-ready" : j.status === "Queued" ? "badge-warning" : "badge-danger"}>
                        {j.status.toUpperCase()}
                      </span>
                    </td>
                    <td style={{ padding: "10px", display: "flex", gap: 6 }}>
                      {j.status === "Queued" && (
                        <button onClick={()=>cancelJob(j.job_id)} className="btn-soft" style={{ padding: "4px 8px", fontSize: 11 }}>Cancel</button>
                      )}
                      <button onClick={()=>deleteJob(j.job_id)} className="btn-soft" style={{ padding: "4px 8px", fontSize: 11 }}>Delete</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

/* --- TAB 3: NOTIFICATION --- */
function NotificationTab() {
  const [notifs, setNotifs] = useState([]);

  const fetchNotifs = useCallback(async () => {
    try {
      const res = await fetch(`${API}/notifications`);
      setNotifs(await res.json());
    } catch(e){}
  }, []);

  useEffect(() => { fetchNotifs(); }, [fetchNotifs]);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16, maxWidth: 900 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700 }}>System Notifications</h3>
        <button onClick={()=>fetch(`${API}/notifications/read`,{method:"POST"}).then(fetchNotifs)} className="btn-soft">Mark All Read</button>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {notifs.map(n => (
          <div key={n.id} className="card" style={{ padding: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontWeight: 700, fontSize: 13.5 }}>{n.title}</span>
              <span className="mono" style={{ fontSize: 10.5, color: "var(--text-muted)" }}>{n.timestamp}</span>
            </div>
            <div style={{ fontSize: 12.5, color: "var(--text-muted)", marginTop: 4 }}>{n.message}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* --- TAB 4: SUPPORT (CHAT) --- */
function SupportTab() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");

  const fetchMessages = useCallback(async () => {
    try {
      const res = await fetch(`${API}/support/messages`);
      setMessages(await res.json());
    } catch(e){}
  }, []);

  useEffect(() => { fetchMessages(); }, [fetchMessages]);

  const sendSupport = async () => {
    if (!input.trim()) return;
    const txt = input.trim();
    setInput("");
    await fetch(`${API}/support/chat`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: txt })
    });
    fetchMessages();
  };

  return (
    <div className="card" style={{ display: "flex", flexDirection: "column", height: 500, maxWidth: 840 }}>
      <h3 style={{ margin: "0 0 14px 0", fontSize: 15, fontWeight: 700 }}>IT Support Channel</h3>
      <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 10 }}>

          <div key={m.id} style={{

        <button onClick={sendSupport} className="btn-black">Send</button>

/* --- TAB 6: AGENT (OPENROUTER AI) --- */
function AgentTab() {
  const [messages, setMessages] = useState([
    { role: "assistant", text: "Hello! I am your domain-guarded VectorOps Cluster Agent. Ask me anything regarding GPU telemetry, scheduler scoring, or VRAM optimization." }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);

  const sendPrompt = async () => {
    if (!input.trim()) return;
    const prompt = input.trim();
    setInput("");
    setMessages(m => [...m, { role: "user", text: prompt }]);
    setLoading(true);

    try {
      const res = await fetch(`${API}/agent/chat`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      });
      const data = await res.json();
      setMessages(m => [...m, { role: "assistant", text: data.answer, source: data.source }]);
    } catch(e) {
      setMessages(m => [...m, { role: "assistant", text: "Error connecting to Agent." }]);
    }
    setLoading(false);
  };

  return (
    <div className="card" style={{ display: "flex", flexDirection: "column", height: 500, maxWidth: 840 }}>
      <h3 style={{ margin: "0 0 14px 0", fontSize: 15, fontWeight: 700 }}>OpenRouter Domain-Gated Agent</h3>
      <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 10 }}>
        {messages.map((m, i) => (
          <div key={i} style={{
            alignSelf: m.role === "user" ? "flex-end" : "flex-start",
            maxWidth: "85%", background: m.role === "user" ? "var(--pill-black)" : "#f4f4f5",
            color: m.role === "user" ? "#ffffff" : "var(--text-heading)",
            borderRadius: 10, padding: "10px 14px", fontSize: 13
          }}>
            <div>{m.text}</div>
          </div>
        ))}
        {loading && <div style={{ fontSize: 12, color: "var(--text-muted)" }}>Agent thinking...</div>}
      </div>
      <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendPrompt()} placeholder="Ask Agent regarding GPU cluster tasks..." style={{ flex: 1, padding: "10px 12px", borderRadius: 8, border: "1px solid var(--border-card)", fontSize: 13 }} />
        <button onClick={sendPrompt} className="btn-black">Ask Agent</button>
      </div>
    </div>
  );
}

/* --- TAB 7: FEEDBACK --- */
function FeedbackTab() {
  const [name, setName] = useState("");
  const [comments, setComments] = useState("");
  const [feedbackList, setFeedbackList] = useState([]);

  const fetchFeedback = useCallback(async () => {
    try {
      const res = await fetch(`${API}/feedback`);
      setFeedbackList(await res.json());
    } catch(e){}
  }, []);

  useEffect(() => { fetchFeedback(); }, [fetchFeedback]);

  const submitForm = async (e) => {
    e.preventDefault();
    if (!name || !comments) return;
    await fetch(`${API}/feedback`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_name: name, category: "general", rating: 5, comments })
    });
    setName(""); setComments("");
    fetchFeedback();
  };

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr", gap: 20, maxWidth: 900 }}>
      <div className="card">
        <h3 style={{ margin: "0 0 14px 0", fontSize: 15, fontWeight: 700 }}>Submit Feedback</h3>
        <form onSubmit={submitForm} style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your Name" style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border-card)", fontSize: 13 }} required />
          <textarea value={comments} onChange={e=>setComments(e.target.value)} rows="4" placeholder="Feedback or issue details..." style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid var(--border-card)", fontSize: 13 }} required />
          <button type="submit" className="btn-black">Submit</button>
        </form>
      </div>

      <div className="card">
        <h3 style={{ margin: "0 0 14px 0", fontSize: 15, fontWeight: 700 }}>Recent Submissions</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {feedbackList.map(f => (
            <div key={f.id} style={{ background: "#fafafa", padding: 10, borderRadius: 8, border: "1px solid var(--border-card)" }}>
              <div style={{ fontWeight: 700, fontSize: 12 }}>{f.user_name}</div>
              <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 2 }}>"{f.comments}"</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* --- MAIN CONTAINER APP --- */
function App() {

  const [nodes, setNodes] = useState([]);

    try {
      const [nRes, dRes, cRes] = await Promise.all([
        fetch(`${API}/nodes`), fetch(`${API}/decisions`), fetch(`${API}/cost`)
      ]);
      setNodes(await nRes.json());
      setDecisions(await dRes.json());
      setCost(await cRes.json());
    } catch (e) {}
  }, []);

  useEffect(() => { refresh(); }, [refresh]);
  useInterval(refresh, 2000);

  const titles = {
    home: { title: "VectorOps Cluster Intelligence", sub: "Contribute hardware acceleration to train VectorOps Machine Learning Models" },

  return (
    <div className="app-container">
      {/* Left Sidebar */}
      <aside className="sidebar">
        <div className="sidebar-header">
          <div className="sidebar-title">VectorOps</div>
          <div className="sidebar-subtitle">WORKSPACE</div>
        </div>

        <nav className="nav-list">

            <Icons.Home /> <span>Home</span>
          </button>
          <button onClick={()=>setTab("work")} className={`nav-btn ${tab==="work"?"active":""}`}>
            <Icons.Work /> <span>Work</span>
          </button>
          <button onClick={()=>setTab("notification")} className={`nav-btn ${tab==="notification"?"active":""}`}>
            <Icons.Notifications /> <span>Notifications</span>
          </button>
          <button onClick={()=>setTab("support")} className={`nav-btn ${tab==="support"?"active":""}`}>
            <Icons.Support /> <span>Support</span>
          </button>

          <button onClick={()=>setTab("training")} className={`nav-btn ${tab==="training"?"active":""}`}>
            <Icons.Training /> <span>Training</span>
          </button>
          <button onClick={()=>setTab("agent")} className={`nav-btn ${tab==="agent"?"active":""}`}>
            <Icons.Agent /> <span>Agent</span>
          </button>
          <button onClick={()=>setTab("feedback")} className={`nav-btn ${tab==="feedback"?"active":""}`}>
            <Icons.Feedback /> <span>Feedback</span>

        </nav>

        <div className="user-footer">
          <div className="user-avatar">W</div>
          <div className="user-info">
            <div className="user-name">Wasif Abdullah Musa</div>
            <div className="user-role">Chairman / Lab Director</div>
          </div>
        </div>
      </aside>

      {/* Main Wrapper */}
      <div className="main-wrapper">
        <div className="sandbox-bar">
          <span className="sandbox-tag">SANDBOX</span> This workspace is separate from production data.
        </div>

        <header className="content-header">
          <div>
            <h1 className="page-title">{titles[tab].title}</h1>
            <div className="page-subtitle">{titles[tab].sub}</div>
          </div>
          <div className="nvidia-badge">
            <svg width="36" height="28" viewBox="0 0 100 80" fill="#76b900">
              <path d="M 30,10 C 20,10 10,20 10,30 C 10,50 30,70 50,70 C 60,70 70,65 75,55 L 65,50 C 60,55 55,60 48,60 C 35,60 22,48 22,35 C 22,22 35,18 45,18 L 45,10 Z"/>

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
